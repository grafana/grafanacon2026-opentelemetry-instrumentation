receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 10s
    timeout: 5s

  hostmetrics:
    root_path: /hostfs
    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.logical.count:
            enabled: true
      disk: {}
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true
      load: {}
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
          system.memory.limit:
            enabled: true
      network:
        metrics:
          system.network.connections:
            enabled: true
      paging: {}
      processes: {}

processors:
  resourcedetection:
    detectors: [env, system]
    timeout: 2s
    override: false

  batch:
    timeout: 1s

  filter/drop_frontend_noise:
    error_mode: ignore
    traces:
      span:
        - >-
          resource.attributes["service.name"] == "frontend" and
          kind == SPAN_KIND_SERVER and
          (attributes["url.path"] == "/health" or
          IsMatch(attributes["url.path"], "\\.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|map)(\\?.*)?$"))

  transform/anonymize_enduser:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["enduser.id"], Substring(SHA256(attributes["enduser.id"]), 0, 8)) where attributes["enduser.id"] != nil

  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 100
    policies:
      - name: errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: slow_traces
        type: latency
        latency:
          threshold_ms: 1000

exporters:
  otlp_http:
    endpoint: http://lgtm:4318
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, filter/drop_frontend_noise, tail_sampling, transform/anonymize_enduser, batch]
      exporters: [otlp_http]
    metrics:
      receivers: [otlp, docker_stats, hostmetrics]
      processors: [resourcedetection, batch]
      exporters: [otlp_http]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [otlp_http]
