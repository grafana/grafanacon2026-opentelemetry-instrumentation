services:

  db:
    container_name: db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tapas
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tapas"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL: postgres://postgres:postgres@db:5432/tapas?sslmode=disable
      PORT: "8080"
      CHAOS_MODE: ${CHAOS_MODE:-}
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      PORT: "8080"
      CHAOS_MODE: ${CHAOS_MODE:-}
    ports:
      - "8080:8080"
    depends_on:
      - backend

  lgtm:
    container_name: lgtm
    image: grafana/otel-lgtm:0.20.0
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/dashboards/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/hostmetrics.yaml:ro
      - ./grafana/dashboards:/otel-lgtm/grafana/dashboards:ro

  otel-collector:
    container_name: otel-collector
    image: otel/opentelemetry-collector-contrib:0.147.0
    user: "0"
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/hostfs:ro
    depends_on:
      - lgtm

volumes:
  db_data:
