services:

  db:
    container_name: db
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tapas
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tapas"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL: postgres://postgres:postgres@db:5432/tapas?sslmode=disable
      PORT: "8080"
      CHAOS_MODE: ${CHAOS_MODE:-}
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      PORT: "8080"
      CHAOS_MODE: ${CHAOS_MODE:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  lgtm:
    container_name: lgtm
    image: grafana/otel-lgtm:0.25.0@sha256:cc97e494d697f0b45997f91ad3b350fd85a5fe51afc41783ba5fcaebe19560cf
    ports:
      - "3000:3000"
      - "3200:3200"
    volumes:
      - ./grafana/provisioning/dashboards/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/hostmetrics.yaml:ro
      - ./grafana/dashboards:/otel-lgtm/grafana/dashboards:ro
      - ./grafana/provisioning/alerting:/otel-lgtm/grafana/conf/provisioning/alerting:ro
      - lgtm_data:/data

  otel-collector:
    container_name: otel-collector
    image: otel/opentelemetry-collector-contrib:0.149.0@sha256:0fba96233274f6d665ac8831ad99dfe6479a9a20459f6e2719c0d20945773b46
    user: "0"
    environment:
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment.name=development
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - lgtm

  load-test:
    container_name: load-test
    image: grafana/k6
    environment:
      BASE_URL: ${BASE_URL:-http://frontend:8080}
    volumes:
      - ./load-test.js:/scripts/load-test.js:ro
    command: ["run", "--quiet", "/scripts/load-test.js"]
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  db_data:
  lgtm_data:
