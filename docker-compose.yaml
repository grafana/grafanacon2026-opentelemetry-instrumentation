services:

  db:
    container_name: db
    image: postgres:18-alpine@sha256:52098013b4b64a746626437d38afc03cabff6cdeb4d3d92e2342aa95f0ce56ea
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tapas
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tapas"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL: postgres://postgres:postgres@db:5432/tapas?sslmode=disable
      PORT: "8080"
      CHAOS_MODE: ${CHAOS_MODE:-}
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      PORT: "8080"
      CHAOS_MODE: ${CHAOS_MODE:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  lgtm:
    container_name: lgtm
    image: grafana/otel-lgtm:0.24.0@sha256:a7fbde2893d86ae4807701bc482736243e584eb90b5faa273d291ffff2a1374f
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/dashboards/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/hostmetrics.yaml:ro
      - ./grafana/dashboards:/otel-lgtm/grafana/dashboards:ro
      - ./grafana/provisioning/alerting:/otel-lgtm/grafana/conf/provisioning/alerting:ro

  otel-collector:
    container_name: otel-collector
    image: otel/opentelemetry-collector-contrib:0.149.0@sha256:0fba96233274f6d665ac8831ad99dfe6479a9a20459f6e2719c0d20945773b46
    user: "0"
    environment:
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment.name=development
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - lgtm

volumes:
  db_data:
